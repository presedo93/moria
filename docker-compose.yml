services:
  # ── Infrastructure ───────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: moria
      POSTGRES_PASSWORD: moria
      POSTGRES_DB: moria
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moria"]
      interval: 2s
      timeout: 5s
      retries: 10

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    depends_on:
      jaeger:
        condition: service_started

  jaeger:
    image: jaegertracing/all-in-one:1.54
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686" # Jaeger UI
      - "4317"        # OTLP gRPC (internal, used by collector)

  # ── Application services ─────────────────────────────────
  market-data:
    build: .
    command: moria-market-data
    develop:
      watch:
        - action: rebuild
          path: crates/market-data/
        - action: rebuild
          path: crates/common/
        - action: rebuild
          path: crates/proto/
        - action: rebuild
          path: proto/
        - action: rebuild
          path: Cargo.toml
        - action: rebuild
          path: Cargo.lock
    environment:
      BYBIT_WS_URL: wss://stream-testnet.bybit.com/v5/public/linear
      TRADING_PAIR: BTCUSDT
      KLINE_INTERVAL: "1"
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-}
      MARKET_DATA_GRPC_ADDR: "0.0.0.0:50051"
      METRICS_ADDR: "0.0.0.0:9101"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      RUST_LOG: info,market_data=debug
    ports:
      - "50051:50051"
      - "9101:9101"
    depends_on:
      otel-collector:
        condition: service_started

  strategy:
    build: .
    command: moria-strategy
    develop:
      watch:
        - action: rebuild
          path: crates/strategy/
        - action: rebuild
          path: crates/common/
        - action: rebuild
          path: crates/proto/
        - action: rebuild
          path: proto/
        - action: rebuild
          path: Cargo.toml
        - action: rebuild
          path: Cargo.lock
    environment:
      TRADING_PAIR: BTCUSDT
      KLINE_INTERVAL: "1"
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-}
      SMA_SHORT_PERIOD: "10"
      SMA_LONG_PERIOD: "30"
      ORDER_QTY: "0.001"
      ACCOUNT_EQUITY_USD: "10000"
      RISK_BUDGET_PCT: "0.01"
      MAX_NOTIONAL_PER_TRADE: "2500"
      VOLATILITY_WINDOW: "20"
      MIN_VOLATILITY: "0.001"
      MARKET_DATA_GRPC_ADDR: market-data:50051
      RISK_GRPC_ADDR: risk:50053
      STRATEGY_GRPC_ADDR: "0.0.0.0:50052"
      METRICS_ADDR: "0.0.0.0:9102"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      RUST_LOG: info,strategy=debug
    ports:
      - "9102:9102"
    depends_on:
      market-data:
        condition: service_started
      risk:
        condition: service_started

  risk:
    build: .
    command: moria-risk
    develop:
      watch:
        - action: rebuild
          path: crates/risk/
        - action: rebuild
          path: crates/common/
        - action: rebuild
          path: crates/proto/
        - action: rebuild
          path: proto/
        - action: rebuild
          path: Cargo.toml
        - action: rebuild
          path: Cargo.lock
        - action: rebuild
          path: migrations/
    environment:
      DATABASE_URL: postgres://moria:moria@postgres:5432/moria
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-}
      MAX_POSITION_SIZE: "1.0"
      MAX_DAILY_LOSS: "100.0"
      ORDER_GRPC_ADDR: order:50054
      RISK_GRPC_ADDR: "0.0.0.0:50053"
      METRICS_ADDR: "0.0.0.0:9103"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      RUST_LOG: info,risk=debug
    ports:
      - "50053:50053"
      - "9103:9103"
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started

  order:
    build: .
    command: moria-order
    develop:
      watch:
        - action: rebuild
          path: crates/order/
        - action: rebuild
          path: crates/common/
        - action: rebuild
          path: crates/proto/
        - action: rebuild
          path: proto/
        - action: rebuild
          path: Cargo.toml
        - action: rebuild
          path: Cargo.lock
    environment:
      BYBIT_API_KEY: ${BYBIT_API_KEY:-}
      BYBIT_API_SECRET: ${BYBIT_API_SECRET:-}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-}
      BYBIT_REST_URL: https://api-testnet.bybit.com
      ORDER_GRPC_ADDR: "0.0.0.0:50054"
      METRICS_ADDR: "0.0.0.0:9104"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      RUST_LOG: info,order=debug
    ports:
      - "50054:50054"
      - "9104:9104"
    depends_on:
      otel-collector:
        condition: service_started

  reconciler:
    build: .
    command: moria-reconciler
    develop:
      watch:
        - action: rebuild
          path: crates/reconciler/
        - action: rebuild
          path: crates/common/
        - action: rebuild
          path: crates/proto/
        - action: rebuild
          path: proto/
        - action: rebuild
          path: Cargo.toml
        - action: rebuild
          path: Cargo.lock
        - action: rebuild
          path: migrations/
    environment:
      DATABASE_URL: postgres://moria:moria@postgres:5432/moria
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-}
      ORDER_GRPC_ADDR: order:50054
      METRICS_ADDR: "0.0.0.0:9105"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      RUST_LOG: info,reconciler=debug
    ports:
      - "9105:9105"
    depends_on:
      postgres:
        condition: service_healthy
      order:
        condition: service_started
      otel-collector:
        condition: service_started

volumes:
  pgdata:
