syntax = "proto3";

package strategy;

message Signal {
  string id = 1;
  string symbol = 2;
  string side = 3;
  string order_type = 4;
  string price = 5;
  string qty = 6;
  int64 timestamp = 7;
  string strategy_name = 8;
}

message SignalAck {
  string signal_id = 1;
  bool accepted = 2;
  string reason = 3;
}
