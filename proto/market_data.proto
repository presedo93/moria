syntax = "proto3";

package market_data;

message Level {
  double price = 1;
  double qty = 2;
}

message Kline {
  string symbol = 1;
  string interval = 2;
  double open = 3;
  double high = 4;
  double low = 5;
  double close = 6;
  double volume = 7;
  int64 timestamp = 8;
}

message Trade {
  string symbol = 1;
  double price = 2;
  double qty = 3;
  string side = 4;
  int64 timestamp = 5;
}

message OrderbookSnapshot {
  string symbol = 1;
  repeated Level bids = 2;
  repeated Level asks = 3;
  int64 timestamp = 4;
}

message StreamRequest {
  string symbol = 1;
  string interval = 2;
}

service MarketDataService {
  rpc StreamKlines(StreamRequest) returns (stream Kline);
  rpc StreamTrades(StreamRequest) returns (stream Trade);
  rpc StreamOrderbook(StreamRequest) returns (stream OrderbookSnapshot);
}
