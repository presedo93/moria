syntax = "proto3";

package market_data;

message Level {
  string price = 1;
  string qty = 2;
}

message Kline {
  string symbol = 1;
  string interval = 2;
  string open = 3;
  string high = 4;
  string low = 5;
  string close = 6;
  string volume = 7;
  int64 timestamp = 8;
}

message Trade {
  string symbol = 1;
  string price = 2;
  string qty = 3;
  string side = 4;
  int64 timestamp = 5;
}

message OrderbookSnapshot {
  string symbol = 1;
  repeated Level bids = 2;
  repeated Level asks = 3;
  int64 timestamp = 4;
}

message StreamRequest {
  string symbol = 1;
  string interval = 2;
}

service MarketDataService {
  rpc StreamKlines(StreamRequest) returns (stream Kline);
  rpc StreamTrades(StreamRequest) returns (stream Trade);
  rpc StreamOrderbook(StreamRequest) returns (stream OrderbookSnapshot);
}
